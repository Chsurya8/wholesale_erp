<!DOCTYPE html>
<html>
<head>
<title>ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{margin:0;background:#f3f4f6;}
.sidebar{width:220px;height:100vh;background:#111827;position:fixed;}
.sidebar a{color:#cbd5e1;display:block;padding:12px;text-decoration:none;}
.sidebar a:hover{background:#374151;color:white;}
.main{margin-left:220px;padding:20px;}
</style>
</head>

<body>

<div class="sidebar">
<h4 class="text-white text-center mt-4">ERP</h4>
<a href="/">Dashboard</a>
<a href="/products">Products</a>
<a href="/customers">Customers</a>
<a href="/orders">Orders</a>
<a href="/suppliers">Suppliers</a>
<a href="/sales">Sales</a>
</div>

<div class="main">
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="alert alert-warning" role="alert">
      {% for msg in messages %}
        <div>{{ msg }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}
</div>

</body>
</html>
