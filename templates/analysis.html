{% extends "layout.html" %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.content-wrapper {
    margin: 20px;
}

/* SMALL GRAPH */
.chart-box {
    width: 55%;
    margin: 30px auto;
}

.chart-box canvas {
    height: 280px !important;
    background: white;
    padding: 10px;
    border-radius: 10px;
}

/* TABLE STYLE */
table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 40px;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

th {
    background: #f2f2f2;
}
</style>

<div class="content-wrapper">

<h1>Sales Analysis</h1>

<!-- ✅ GRAPH -->
<h3>Top Selling Products</h3>

<div class="chart-box">
    <canvas id="barChart"></canvas>
</div>

<!-- ✅ TABLE 1 -->
<h3>Top Products</h3>
<table>
<tr>
<th>Product</th>
<th>Sold</th>
</tr>

{% for t in top_products %}
<tr>
<td>{{ t[0] }}</td>
<td>{{ t[1] }}</td>
</tr>
{% endfor %}

</table>

<!-- ✅ TABLE 2 -->
<h3>Monthly Sales</h3>
<table>
<tr>
<th>Month</th>
<th>Total</th>
</tr>

{% for m in monthly_sales %}
<tr>
<td>{{ m[0] }}</td>
<td>{{ m[1] }}</td>
</tr>
{% endfor %}

</table>

</div>

<!-- ✅ SAFE JSON BLOCK (THIS FIXES YOUR ERROR) -->
<script type="application/json" id="chartData">
{
    "labels": {{ product_names | safe }},
    "values": {{ product_values | safe }}
}
</script>

<script>
const chartRaw = document.getElementById("chartData").textContent;
const chart = JSON.parse(chartRaw);

const labels = chart.labels.length ? chart.labels : ["No Data"];
const data = chart.values.length ? chart.values : [0];

new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
        labels: labels,
        datasets: [{
            label: "Products Sold",
            data: data
        }]
    },
    options: {
        responsive: true
    }
});
</script>

{% endblock %}
