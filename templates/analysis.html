{% extends "layout.html" %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.content-wrapper {
    margin: 20px;
}

/* ✅ CHART SIZE CONTROL */
.chart-box {
    width: 60%;
    margin: 30px auto;
}

.chart-box canvas {
    width: 100% !important;
    height: 300px !important;
    background: white;
    padding: 15px;
    border-radius: 10px;
}

/* ✅ TABLE STYLE (same as your original) */
table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 40px;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

th {
    background: #f2f2f2;
}
</style>

<div class="content-wrapper">

<h1>Sales Analysis</h1>

<!-- ✅ SMALL BAR CHART -->
<h3>Top Selling Products</h3>

<div class="chart-box">
    <canvas id="barChart"></canvas>
</div>

<!-- ✅ TABLE 1 -->
<h3>Top Products Table</h3>
<table>
<tr>
<th>Product</th>
<th>Total Sold</th>
</tr>

{% for t in top_products %}
<tr>
<td>{{ t[0] }}</td>
<td>{{ t[1] }}</td>
</tr>
{% endfor %}

</table>

<!-- ✅ TABLE 2 -->
<h3>Monthly Sales</h3>
<table>
<tr>
<th>Month</th>
<th>Total</th>
</tr>

{% for m in monthly_sales %}
<tr>
<td>{{ m[0] }}</td>
<td>{{ m[1] }}</td>
</tr>
{% endfor %}

</table>

</div>

<!-- ✅ SAFE JSON DATA (NO VS CODE ERROR) -->
<script id="chart-data" type="application/json">
{
    "labels": {{ product_names | safe }},
    "data": {{ product_values | safe }}
}
</script>

<script>

// ✅ READ DATA SAFELY
const rawData = document.getElementById("chart-data").textContent;
const parsedData = JSON.parse(rawData);

let labels = parsedData.labels;
let data = parsedData.data;

// fallback if empty
if(labels.length === 0){
    labels = ["No Data"];
    data = [0];
}

// ✅ BAR CHART
new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Products Sold',
            data: data
        }]
    },
    options: {
        responsive: true
    }
});

</script>

</body>
</html>
