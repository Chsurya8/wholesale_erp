<!DOCTYPE html>
<html>
<head>

<title>Customers</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Customer Management</h2>

<div class="card mb-4">
<div class="card-body">

<form method="POST" class="row g-3">

<div class="col-md-3">
<input name="name" class="form-control" placeholder="Customer Name" required>
</div>

<div class="col-md-3">
<input name="contact" class="form-control" placeholder="Contact" required>
</div>

<div class="col-md-4">
<input name="address" class="form-control" placeholder="Address" required>
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100">Add Customer</button>
</div>

</form>

</div>
</div>


<div class="card">
<div class="card-body">

<table class="table table-striped table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Contact</th>
<th>Address</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for c in customers %}

<tr>
<td>{{ c[0] }}</td>
<td>{{ c[1] }}</td>
<td>{{ c[2] }}</td>
<td>{{ c[3] }}</td>

<td>
<a href="/delete_customer/{{ c[0] }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this customer?')">
Delete
</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>
</div>

</div>

</body>
</html>
