<!DOCTYPE html>
<html>
<head>

<title>Orders</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Create Order</h2>

<div class="card mb-4">
<div class="card-body">

<form method="POST" class="row g-3">

<div class="col-md-4">

<select name="customer" class="form-control">

{% for c in customers %}
<option value="{{ c[0] }}">{{ c[1] }}</option>
{% endfor %}

</select>

</div>

<div class="col-md-4">

<select name="product" class="form-control">

{% for p in products %}
<option value="{{ p[0] }}">{{ p[1] }}</option>
{% endfor %}

</select>

</div>

<div class="col-md-2">
<input name="quantity" class="form-control" placeholder="Quantity">
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100">Create</button>
</div>

</form>

</div>
</div>


<div class="card">
<div class="card-body">

<h4 class="mb-3">Orders</h4>

<table class="table table-striped table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Customer</th>
<th>Date</th>
<th>Total</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for o in orders %}

<tr>

<td>{{ o[0] }}</td>
<td>{{ o[1] }}</td>
<td>{{ o[2] }}</td>
<td>{{ o[3] }}</td>

<td>

<a href="/delete_order/{{ o[0] }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this order?')">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>
</div>

</div>

</body>
</html>
