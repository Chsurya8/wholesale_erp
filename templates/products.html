{% extends "layout.html" %}

{% block content %}

<style>
    .content-wrapper{
        margin:20px;
    }

    table{
        border-collapse: collapse;
        width:100%;
    }

    th,td{
        border:1px solid #ddd;
        padding:10px;
        text-align:center;
    }

    th{
        background:#f2f2f2;
    }

    input,button{
        padding:8px;
        margin:5px;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
    }

    .add-form{
        margin-bottom:30px;
    }

    .delete{
        color:red;
        text-decoration:none;
    }
</style>

<div class="content-wrapper">

<h1>Product Management</h1>

<div class="top-bar">

    <!-- SEARCH BAR -->
    <form method="GET" action="/products">
        <input type="text" name="search" placeholder="Search product name">
        <button type="submit">Search</button>
    </form>

</div>

<!-- ADD PRODUCT FORM -->
<div class="add-form">

<form method="POST">

    <input type="text" name="name" placeholder="Product Name" required>
    <input type="text" name="category" placeholder="Category" required>
    <input type="number" step="0.01" name="price" placeholder="Price" required>
    <input type="number" name="stock" placeholder="Stock" required>

    <button type="submit">Add Product</button>

</form>

</div>

<!-- PRODUCT TABLE -->

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Category</th>
<th>Price</th>
<th>Stock</th>
<th>Action</th>
</tr>

{% for p in products %}

<tr>
<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}}</td>
<td>{{p[4]}}</td>

<td>
<a class="delete" href="/delete_product/{{p[0]}}">
Delete
</a>
</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
