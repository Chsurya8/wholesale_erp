{% extends "layout.html" %}

{% block content %}

<h2 class="mb-4">Dashboard</h2>

<div class="row g-4">

    <div class="col-md-4">
        <div class="card p-4 text-center shadow-sm">
            <h5>Total Products</h5>
            <h3 class="text-primary">{{ total_products }}</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-4 text-center shadow-sm">
            <h5>Total Customers</h5>
            <h3 class="text-success">{{ total_customers }}</h3>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-4 text-center shadow-sm">
            <h5>Total Orders</h5>
            <h3 class="text-danger">{{ total_orders }}</h3>
        </div>
    </div>

</div>

<!-- ACTION BUTTONS -->
<div class="mt-5 d-flex flex-wrap gap-3">

    <a href="/products" class="btn btn-primary">
        Product Management
    </a>

    <a href="/customers" class="btn btn-success">
        Customer Management
    </a>

    <a href="/orders" class="btn btn-warning">
        Order Management
    </a>

    <a href="/sales" class="btn btn-dark">
        Sales Analysis
    </a>

</div>

{% endblock %}
