<!DOCTYPE html>
<html>
<head>
<title>Wholesale ERP Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

.dashboard-title{
font-size:28px;
font-weight:600;
margin-bottom:30px;
}

.card-box{
background:white;
border-radius:10px;
padding:25px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
transition:0.2s;
}

.card-box:hover{
transform:translateY(-5px);
}

.card-title{
font-size:16px;
color:#555;
}

.card-value{
font-size:32px;
font-weight:bold;
margin-top:10px;
}

.btn-area{
margin-top:40px;
}

.nav-btn{
padding:12px 22px;
font-weight:500;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container mt-5">

<div class="dashboard-title">
Wholesale ERP Dashboard
</div>

<div class="row g-4">

<div class="col-md-4">
<div class="card-box">
<div class="card-title">Total Products</div>
<div class="card-value text-primary">{{ total_products }}</div>
</div>
</div>

<div class="col-md-4">
<div class="card-box">
<div class="card-title">Total Customers</div>
<div class="card-value text-success">{{ total_customers }}</div>
</div>
</div>

<div class="col-md-4">
<div class="card-box">
<div class="card-title">Total Orders</div>
<div class="card-value text-danger">{{ total_orders }}</div>
</div>
</div>

</div>

<div class="btn-area">

<a href="/products" class="btn btn-primary nav-btn">
Product Management
</a>

<a href="/customers" class="btn btn-success nav-btn">
Customer Management
</a>

<a href="/orders" class="btn btn-warning nav-btn">
Order Management
</a>

<a href="/sales" class="btn btn-dark nav-btn">
Sales Analysis
</a>

</div>

</div>

</body>
</html>
